<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MCCMS</title>
    <link rel="stylesheet" href="css/base/base.css">
    <link rel="stylesheet" href="css/pages/auth-refined.css">
</head>
<body class="auth-page">
    <div class="auth-card-refined">
        <header class="auth-header">
            <h1>Login</h1>
            <p>Welcome back please login to your account</p>
        </header>

        <div id="errorBox" class="error-box-refined"></div>

        <form id="loginForm" class="form-refined">
            <div class="form-group-refined">
                <div class="input-wrapper">
                    <input class="input-refined" type="email" id="email" placeholder="User Name" required>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>

            <div class="form-group-refined">
                <div class="input-wrapper">
                    <input class="input-refined" type="password" id="password" placeholder="Password" required>
                    <button type="button" class="password-toggle-premium" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <label class="remember-container">
                <input type="checkbox"> Remember me
            </label>

            <button type="submit" class="btn-auth">Login</button>
        </form>

        <footer class="auth-footer-refined">
            Don't have an account? <a href="register.html">Signup</a>
        </footer>

        <div class="created-by">Created by mikekagwi</div>
    </div>

    <script type="module" src="js/pages/login-ui.js"></script>
</body>
</html>

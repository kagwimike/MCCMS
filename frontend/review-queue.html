<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Queue | MCCMS</title>
    <link rel="stylesheet" href="css/base/base.css">
    <link rel="stylesheet" href="css/pages/dashboard-premium.css">
    <link rel="stylesheet" href="css/pages/review.css">
    <link rel="stylesheet" href="css/components/modals.css">
</head>
<body class="dashboard-premium-layout">
    <header class="mobile-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="logo-box" style="width: 24px; height: 24px; font-size: 10px;">CC</div>
        <div></div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar-premium" id="sidebar">
        <div class="logo-premium">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary);"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            MCCMS
        </div>

        <div class="sidebar-nav-container">
            <div class="nav-group">
                <div class="sidebar-section-label">Overview</div>
                <a href="dashboard.html" class="nav-item-premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="notifications.html" class="nav-item-premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    Notifications
                </a>
            </div>

            <div class="nav-group">
                <div class="sidebar-section-label">Management</div>
                <a href="#" class="nav-item-premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    Content Projects
                </a>
                <a href="review-queue.html" class="nav-item-premium active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Review Queue
                </a>
            </div>

            <div class="nav-group">
                <div class="sidebar-section-label">Insights</div>
                <a href="analytics.html" class="nav-item-premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Analytics
                </a>
            </div>

            <div class="nav-group" id="adminSection" style="display: none;">
                <div class="sidebar-section-label">Admin</div>
                <a href="admin-settings.html" class="nav-item-premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-profile" id="userProfileCard">
                <div class="profile-avatar" id="userAvatar">U</div>
                <div class="profile-info" style="flex: 1; overflow: hidden;">
                    <div class="profile-name" id="profileName" style="font-size: 12px; white-space: nowrap; text-overflow: ellipsis; font-weight: 700;">User Name</div>
                    <div class="profile-role" id="profileRole" style="font-size: 10px; color: var(--color-text-muted); text-transform: uppercase;">Creator</div>
                </div>
                <button id="logoutBtn" style="background:none; border:none; color:var(--color-error); cursor:pointer; margin-left:auto;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="content-premium">
        <header class="header-premium">
            <h1>Review Queue</h1>
            <p class="text-muted text-sm">Managing pending quality checks across the pipeline.</p>
        </header>

        <section>
            <div class="table-premium-container">
                <table class="table-premium">
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Platform</th>
                            <th>Stage</th>
                            <th>Status</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="queueList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-container" style="max-width: 600px;">
            <div class="modal-header">
                <h2 class="modal-title">Review Deliverable</h2>
            </div>
            <form id="reviewForm">
                <div class="modal-body">
                    <div id="commentHistory" style="max-height: 200px; overflow-y: auto; margin-bottom: 1.5rem; padding-right: 5px;"></div>
                    <div class="form-group-premium">
                        <label class="label-premium">Feedback Notes</label>
                        <textarea class="input-premium textarea-premium" id="reviewText" required placeholder="Describe what needs to be improved..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('reviewModal').style.display='none'">Close</button>
                    <button type="button" class="btn btn-reject" onclick="window.submitReview('REJECTED')">Reject</button>
                    <button type="button" class="btn-approve" onclick="window.submitReview('APPROVED')">Approve Content</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/pages/review-ui.js"></script>
    <script type="module">
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (menuToggle) {
            menuToggle.onclick = () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
            overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        }
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'ADMIN') document.getElementById('adminSection').style.display = 'block';
    </script>
</body>
</html>

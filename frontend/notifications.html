<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | MCCMS</title>
    <link rel="stylesheet" href="css/base/base.css">
    <link rel="stylesheet" href="css/pages/dashboard-premium.css">
    <style>
        .notif-card {
            background: var(--dash-card-bg);
            padding: var(--space-5);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--dash-border);
            border-left: 4px solid var(--color-primary);
            backdrop-filter: blur(12px);
        }
        .notif-card.read { border-left-color: var(--color-border); opacity: 0.6; }
        .notif-card.DEADLINE_RISK { border-left-color: var(--color-error); }
        .notif-card.REVIEW_UPDATE { border-left-color: var(--color-success); }

        .notif-content { flex: 1; padding-right: var(--space-4); }
        .notif-time { font-size: 11px; color: var(--color-text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
        .notif-msg { font-size: 14px; color: #fff; line-height: 1.4; }

        .btn-read {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dash-border);
            color: var(--color-text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }
    </style>
</head>
<body class="dashboard-premium-layout">
    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="logo-premium" style="margin-bottom: 0; font-size: 1.25rem;">MCCMS</div>
        <div style="width: 40px;"></div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar-premium" id="sidebar">
        <div class="logo-premium">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary);"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            MCCMS
        </div>

        <div class="nav-group">
            <div class="sidebar-section-label">Overview</div>
            <a href="dashboard.html" class="nav-item-premium">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </a>
            <a href="notifications.html" class="nav-item-premium active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                Notifications
            </a>
        </div>

        <div class="nav-group">
            <div class="sidebar-section-label">Management</div>
            <a href="#" class="nav-item-premium">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Content Projects
            </a>
            <a href="review-queue.html" class="nav-item-premium">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                Review Queue
            </a>
        </div>

        <div class="nav-group">
            <div class="sidebar-section-label">Insights</div>
            <a href="analytics.html" class="nav-item-premium">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                Analytics
            </a>
        </div>

        <div class="nav-group" id="adminSection" style="display: none;">
            <div class="sidebar-section-label">Admin</div>
            <a href="admin-settings.html" class="nav-item-premium" id="adminLink">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Admin Panel
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="nav-item-premium" id="logoutBtn" style="color: var(--color-error); border: none;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Sign out
            </a>
        </div>
    </aside>

    <main class="content-premium">
        <header class="header-premium">
            <h1>Alert Center</h1>
            <p class="text-muted text-sm">Stay updated on your production pipeline status.</p>
        </header>

        <section id="notifList">
            <!-- Notifications loaded via JS -->
        </section>
    </main>

    <script type="module" src="js/pages/notification-ui.js"></script>
    <script type="module">
        // Standard Sidebar Toggle for Notifications page
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (menuToggle) {
            menuToggle.onclick = () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            };
            overlay.onclick = () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            };
        }
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear();
            window.location.href = 'login.html';
        };
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'ADMIN') document.getElementById('adminLink').style.display = 'block';
    </script>
</body>
</html>
